name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          password: ${{ secrets.EC2_PASSWORD }}
          port: ${{ secrets.EC2_PORT }}
          command_timeout: 30m
          script: |
            sudo -u ubuntu -H bash <<'EOF'
            set -euo pipefail
            export PATH=/usr/local/bin:/usr/bin:/bin:/opt/node-v22.22.2/bin
            export PM2_HOME=/home/ubuntu/.pm2

            REPO_DIR="/srv/uofa/apps/Barbie"
            BACKEND_DIR="$REPO_DIR/apps/backend"
            FRONTEND_DIR="$REPO_DIR/apps/frontend"

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Missing git repository: $REPO_DIR"
              exit 1
            fi

            if [ ! -f "$BACKEND_DIR/.env.production.local" ]; then
              echo "Missing backend env file: $BACKEND_DIR/.env.production.local"
              exit 1
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              echo "pm2 is required on server"
              exit 1
            fi

            cd "$REPO_DIR"

            echo "Fetching latest code..."
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            echo "Installing backend dependencies..."
            cd "$BACKEND_DIR"
            npm ci --omit=dev

            echo "Configuring backend .env for main..."
            # Idempotent upsert: replace KEY=... if present, append otherwise.
            ensure_kv() {
              local file="$1" key="$2" value="$3"
              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                printf '\n%s=%s\n' "$key" "$value" >> "$file"
              fi
            }
            # Telegram bot multi-instance ownership: this deployment claims bots
            # whose runningOn=='main'. Must differ from the preview deployment
            # (which sets BARBIE_INSTANCE_ID=preview).
            ensure_kv .env.production.local BARBIE_INSTANCE_ID main

            # Telegram bot secrets are sensitive and managed manually on the host.
            for key in TELEGRAM_BOT_ENCRYPTION_KEY SUB2API_BASE_URL SUB2API_KEY SUB2API_MODEL; do
              if ! grep -q "^${key}=" .env.production.local; then
                echo "WARNING: ${key} is not set in .env.production.local; the Telegram bot feature will be disabled until you add it."
              fi
            done

            echo "Installing frontend dependencies..."
            cd "$FRONTEND_DIR"
            npm ci

            echo "Building frontend..."
            npm run build

            echo "Restarting backend..."
            pm2 restart barbie-backend --update-env || pm2 start npm --name "barbie-backend" --cwd "$BACKEND_DIR" -- start
            pm2 save

            echo "Deployment completed."
            EOF
