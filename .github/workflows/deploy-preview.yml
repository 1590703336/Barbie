name: Deploy Preview to AWS EC2

on:
  push:
    branches:
      - preview

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Preview to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          password: ${{ secrets.EC2_PASSWORD }}
          port: ${{ secrets.EC2_PORT }}
          command_timeout: 30m
          script: |
            sudo -u ubuntu -H bash <<'EOF'
            set -euo pipefail
            export PATH=/usr/local/bin:/usr/bin:/bin:/opt/node-v22.22.2/bin
            export PM2_HOME=/home/ubuntu/.pm2

            REPO_DIR="/srv/uofa/apps/Barbie-preview"
            BACKEND_DIR="$REPO_DIR/apps/backend"
            FRONTEND_DIR="$REPO_DIR/apps/frontend"

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Missing git repository: $REPO_DIR"
              exit 1
            fi

            if [ ! -f "$BACKEND_DIR/.env.production.local" ]; then
              echo "Missing backend env file: $BACKEND_DIR/.env.production.local"
              exit 1
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              echo "pm2 is required on server"
              exit 1
            fi

            cd "$REPO_DIR"

            echo "Fetching latest code..."
            git fetch origin preview
            git checkout preview
            git pull --ff-only origin preview

            echo "Installing backend dependencies..."
            cd "$BACKEND_DIR"
            npm ci --omit=dev

            echo "Configuring backend .env for preview..."
            # Idempotent upsert: replace KEY=... if present, append otherwise.
            ensure_kv() {
              local file="$1" key="$2" value="$3"
              if grep -q "^${key}=" "$file"; then
                # Use a delimiter unlikely to appear in our values.
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                printf '\n%s=%s\n' "$key" "$value" >> "$file"
              fi
            }
            ensure_kv .env.production.local PORT 4274
            ensure_kv .env.production.local SERVER_URL http://localhost:4274
            ensure_kv .env.production.local FRONTEND_URL https://uofa.ink/preview
            # Telegram bot multi-instance ownership: this deployment claims bots
            # whose runningOn=='preview'. Must differ from the main deployment.
            ensure_kv .env.production.local BARBIE_INSTANCE_ID preview

            # Telegram bot secrets are sensitive and managed manually on the host.
            # If they are missing the bot feature will be disabled but the rest
            # of the app keeps working.
            for key in TELEGRAM_BOT_ENCRYPTION_KEY SUB2API_BASE_URL SUB2API_KEY SUB2API_MODEL; do
              if ! grep -q "^${key}=" .env.production.local; then
                echo "WARNING: ${key} is not set in .env.production.local; the Telegram bot feature will be disabled until you add it."
              fi
            done

            echo "Configuring frontend for preview..."
            cd "$FRONTEND_DIR"
            sed -i "s/const backendPort = .*;/const backendPort = mode === 'development' ? 5500 : 4274;/" vite.config.js
            sed -i "s|.*const base = '/';|  // const base = '/';|" vite.config.js
            sed -i "s|.*// const base = '/preview/';|  const base = '/preview/';|" vite.config.js

            echo "Installing frontend dependencies..."
            npm ci

            echo "Building frontend..."
            npm run build

            echo "Restarting preview backend..."
            pm2 restart barbie-backend-preview --update-env || pm2 start npm --name "barbie-backend-preview" --cwd "$BACKEND_DIR" -- start
            pm2 save

            echo "Preview deployment completed."
            EOF
